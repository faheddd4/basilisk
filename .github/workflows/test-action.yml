name: Test Basilisk Action

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'basilisk/**'
      - 'action.yml'

jobs:
  test-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Basilisk AI Security Scan
        uses: ./
        with:
          target: 'https://basilisk-vulnbot.onrender.com/v1/chat/completions'
          provider: custom
          mode: quick
          fail-on: critical
          output: sarif
